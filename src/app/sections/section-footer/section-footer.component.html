<footer class="s-footer">
  <hr />
  <div class="s-footer__wrapper">
    <p class="s-footer__wrapper-text">
      &copy;{{ currentYear }} SUPERHEROCRUD, Inc
    </p>
    @for (rrss of socialLinks; track rrss.id) {
      <a
        [href]="rrss.url"
        target="_blank"
        rel="noopener noreferrer"
        class="s-footer__icon"
      >
        <img [src]="rrss.icon" alt="{{ rrss.name }}" />
      </a>
    }
  </div>
</footer>
