@if (modalEditService.coreServices.isOpen('edit')) {
<div class="modal-overlay">
  <div class="modal-container">
    <app-form-component
      [form]="coreModal.formControlUpdate"
      mode="edit"
      (submitForm)="onSubmit()"
      (cancelForm)="modalEditService.closeModalEdit()"
      (fileChange)="coreModal.onFileChange($event)"
    />
  </div>
</div>
}
