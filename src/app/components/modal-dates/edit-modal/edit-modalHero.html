@if (modalEditService.isOpen()) {
  <div class="modal-overlay">
    <div class="modal-container">
      <form [formGroup]="formControlUpdate" (ngSubmit)="onSubmit()" class="form-modal-edit">
        <button
          type="button"
          mat-icon-button
          (click)="modalEditService.closeModalEdit()"
          class="btn-close-modal"
        >
          <mat-icon>close</mat-icon>
        </button>
        <h2>Editar héroe</h2>
        <div class="fields-row">
          <div class="field-group">
            <label for="nombre">Nombre</label>
            <input id="nombre" formControlName="nombre" type="text" />
          </div>
          <div class="field-group">
            <label for="poderes">Superpoder</label>
            <input id="poderes" formControlName="poderes" type="text" />
          </div>
        </div>
        <div class="field-group field-full">
          <label for="ubicacion">Ciudad</label>
          <input id="ubicacion" formControlName="ubicacion" type="text" />
        </div>
        <div class="field-group field-full">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" formControlName="descripcion" rows="3"></textarea>
        </div>
        <label for="img">Elige una imagen</label>
        <div class="file-input">
          <input type="file" name="img" id="img" (change)="modalEditService.onFileChange($event)" />
        </div>
        <mat-checkbox class="terminos">
          Acepto los <u style="cursor: pointer">terminos y condiciones</u>
        </mat-checkbox>
        <button type="submit" mat-raised-button color="primary" class="btn-submit">
          Guardar cambios
        </button>
      </form>
    </div>
  </div>
}
