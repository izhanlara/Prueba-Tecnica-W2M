@if (modalAddService.isOpen()) {
  <div class="modal-overlay">
    <div class="modal-container">
      <form
        [formGroup]="modalAddService.formControlAdd"
        (ngSubmit)="modalAddService.onSubmit()"
        class="form-modal-edit"
      >
        <button
          type="button"
          mat-icon-button
          (click)="modalAddService.closeModalAdd()"
          class="btn-close-modal"
        >
          <mat-icon>close</mat-icon>
        </button>
        <h2>Crear nuevo héroe</h2>
        <div class="fields-row">
          <div class="field-group">
            <label for="nombre">Nombre</label>
            <input id="nombre" formControlName="nombre" type="text" />
          </div>
          <div class="field-group">
            <label for="poderes">Superpoder</label>
            <input id="poderes" formControlName="poderes" type="text" />
          </div>
        </div>
        <div class="field-group field-full">
          <label for="ubicacion">Ciudad</label>
          <input id="ubicacion" formControlName="ubicacion" type="text" />
        </div>
        <div class="field-group field-full">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" formControlName="descripcion" rows="3"></textarea>
        </div>
        <div class="field-group field-full file-field">
          <label for="img">Elige una imagen</label>
          <div class="file-input file-input-row">
            <label for="img" class="file-input-trigger">Seleccionar archivo</label>
            <input
              type="file"
              name="img"
              id="img"
              (change)="modalEditService.onFileChange($event)"
            />
            <p class="file-input-hint">Sin archivos seleccionados</p>
          </div>
        </div>
        <div class="form-actions">
          <mat-checkbox class="terminos">
            Acepto los <span class="terms-link">Términos y condiciones</span>
          </mat-checkbox>
          <button type="submit" mat-raised-button color="primary" class="btn-submit">
            Crear héroe
          </button>
        </div>
      </form>
    </div>
  </div>
}
