@if (modalAddService.isOpen()) {
  <div class="modal-overlay">
    <div class="modal-container">
      <app-form-component
        [form]="modalAddService.formControlAdd"
        mode="add"
        (submitForm)="onSubmit()"
        (cancelForm)="closeModalAdd()"
        (fileChange)="modalAddService.onFileChange($event)"
      />
    </div>
  </div>
}
